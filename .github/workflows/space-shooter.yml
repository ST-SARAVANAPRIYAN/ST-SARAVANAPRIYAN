name: Generate Space Shooter Game

on:
  schedule:
    - cron: "0 0 * * *" # Run daily at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate Space Shooter
        uses: czl9707/gh-space-shooter@v1.4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          username: ST-SARAVANAPRIYAN
          output: dist/github-space-shooter.gif # Try to output to dist folder
          # strategies: random (default)

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output-space-shooter
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
